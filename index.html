<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тигримион · Хроники Королевств</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-container">
    <div class="title">⚔️ ТИГРИМИОН · БИТВА КОРОЛЕВСТВ ⚔️</div>
    
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="2">👥 2 Игрока</button>
        <button class="mode-btn" data-mode="3">👥 3 Игрока</button>
        <button class="mode-btn" data-mode="4">👥 4 Игрока</button>
        <button class="mode-btn" data-mode="pc">🤖 Против ПК</button>
    </div>

    <div class="sub">
        Раунд <span id="roundDisplay">1/5</span> · Счёт <span id="scoreDisplay">0 : 0</span>
        <button class="reset-stats-btn" id="resetStatsBtn">📊 Сбросить статистику</button>
    </div>

    <div class="event-cards-row" id="eventCardsContainer"></div>

    <div class="arena" id="arenaContainer"></div>

    <div class="turn-indicator" id="turnIndicator"></div>

    <div style="display: flex; gap: 20px; margin: 20px 0;">
        <button class="fight-btn" id="actionBtn" style="flex: 1;">✅ ЗАКОНЧИТЬ ВЫБОР</button>
    </div>

    <div class="log" id="log">[⚔️] Тигримион ждёт. Выберите героя для Раунда 1.</div>
    <button class="fight-btn reset-btn" id="resetGame" style="margin-top: 10px;">🔄 НОВАЯ КАМПАНИЯ</button>
</div>

<!-- Панель отладки (Ctrl+Shift+D) -->
<div id="debug-panel" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.95);
    border: 2px solid #ffd700;
    border-radius: 12px;
    padding: 15px;
    z-index: 9999;
    display: none;
    backdrop-filter: blur(10px);
    color: white;
    font-family: monospace;
    min-width: 280px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <strong>🔧 Отладка (Ctrl+Shift+D)</strong>
        <button id="close-debug" style="background:red; border:none; color:white; cursor:pointer; border-radius: 4px; padding: 2px 8px;">✕</button>
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">📏 Ширина карточек героев: <span id="hero-width-val">260</span>px</label>
        <input type="range" id="hero-width-slider" min="150" max="400" step="10" value="260" style="width: 100%;">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">📏 Высота карточек героев: <span id="hero-height-val">260</span>px</label>
        <input type="range" id="hero-height-slider" min="150" max="400" step="10" value="260" style="width: 100%;">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">🃏 Ширина карточек событий: <span id="event-width-val">400</span>px</label>
        <input type="range" id="event-width-slider" min="250" max="700" step="10" value="400" style="width: 100%;">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">📝 Размер шрифта заголовка: <span id="title-font-val">2.5</span>rem</label>
        <input type="range" id="title-font-slider" min="1" max="4" step="0.1" value="2.5" style="width: 100%;">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">📝 Размер шрифта текста: <span id="text-font-val">0.9</span>rem</label>
        <input type="range" id="text-font-slider" min="0.6" max="1.5" step="0.05" value="0.9" style="width: 100%;">
    </div>
    
    <div style="margin-bottom: 12px;">
        <label style="display: block; font-size: 12px;">🎴 Скругление углов: <span id="radius-val">20</span>px</label>
        <input type="range" id="radius-slider" min="5" max="50" step="2" value="20" style="width: 100%;">
    </div>
    
    <div style="margin-top: 12px;">
        <button id="reset-debug-btn" style="background: #ffd700; color: black; border: none; padding: 5px 10px; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold;">
            🔄 Сбросить настройки
        </button>
    </div>
</div>

<script>
// ==================== ОТЛАДОЧНЫЙ РЕЖИМ ====================
// Работает без изменения существующих стилей и JS
(function() {
    const panel = document.getElementById('debug-panel');
    
    // Включение/выключение по Ctrl+Shift+D
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'D') {
            e.preventDefault();
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                loadCurrentValues();
            } else {
                panel.style.display = 'none';
            }
        }
    });
    
    document.getElementById('close-debug').onclick = () => panel.style.display = 'none';
    
    // Функция применения стилей ко всем элементам
    function applyStyles() {
        const heroWidth = document.getElementById('hero-width-slider').value;
        const heroHeight = document.getElementById('hero-height-slider').value;
        const eventWidth = document.getElementById('event-width-slider').value;
        const titleFont = document.getElementById('title-font-slider').value;
        const textFont = document.getElementById('text-font-slider').value;
        const radius = document.getElementById('radius-slider').value;
        
        // Обновляем отображаемые значения
        document.getElementById('hero-width-val').innerText = heroWidth;
        document.getElementById('hero-height-val').innerText = heroHeight;
        document.getElementById('event-width-val').innerText = eventWidth;
        document.getElementById('title-font-val').innerText = titleFont;
        document.getElementById('text-font-val').innerText = textFont;
        document.getElementById('radius-val').innerText = radius;
        
        // Применяем стили к карточкам героев
        const heroCards = document.querySelectorAll('.hero-card');
        heroCards.forEach(card => {
            card.style.width = heroWidth + 'px';
            card.style.minWidth = heroWidth + 'px';
            const portrait = card.querySelector('.hero-portrait');
            if (portrait) portrait.style.height = heroHeight + 'px';
        });
        
        // Применяем стили к карточкам событий
        const eventCards = document.querySelectorAll('.event-card');
        eventCards.forEach(card => {
            card.style.width = eventWidth + 'px';
            card.style.minWidth = eventWidth + 'px';
            const portrait = card.querySelector('.event-portrait');
            if (portrait) portrait.style.height = (eventWidth * 0.45) + 'px';
        });
        
        // Применяем шрифты
        const title = document.querySelector('.title');
        if (title) title.style.fontSize = titleFont + 'rem';
        
        const allText = document.querySelectorAll('.hero-name, .hero-subtitle, .power-value, .label-group, .hero-record, .event-name, .event-desc, .log, .player-name, .score-badge, .sub, .mode-btn, .fight-btn, .reset-stats-btn');
        allText.forEach(el => {
            if (el.classList.contains('title')) return;
            if (el.classList.contains('player-name')) {
                el.style.fontSize = (textFont * 1.5) + 'rem';
            } else if (el.classList.contains('hero-name')) {
                el.style.fontSize = (textFont * 1.0) + 'rem';
            } else if (el.classList.contains('hero-subtitle')) {
                el.style.fontSize = (textFont * 0.7) + 'rem';
            } else if (el.classList.contains('event-name')) {
                el.style.fontSize = (textFont * 1.1) + 'rem';
            } else {
                el.style.fontSize = textFont + 'rem';
            }
        });
        
        // Применяем скругление
        const roundedElements = document.querySelectorAll('.game-container, .player-card, .hero-card, .event-card, .log, .fight-btn, .mode-btn');
        roundedElements.forEach(el => {
            if (el.classList.contains('game-container')) {
                el.style.borderRadius = (radius * 2.4) + 'px';
            } else if (el.classList.contains('player-card')) {
                el.style.borderRadius = (radius * 1.6) + 'px';
            } else {
                el.style.borderRadius = radius + 'px';
            }
        });
    }
    
    // Загрузка текущих значений из существующих элементов
    function loadCurrentValues() {
        const heroCard = document.querySelector('.hero-card');
        if (heroCard) {
            const currentWidth = heroCard.offsetWidth;
            const portrait = heroCard.querySelector('.hero-portrait');
            const currentHeight = portrait ? portrait.offsetHeight : 260;
            document.getElementById('hero-width-slider').value = currentWidth;
            document.getElementById('hero-height-slider').value = currentHeight;
            document.getElementById('hero-width-val').innerText = currentWidth;
            document.getElementById('hero-height-val').innerText = currentHeight;
        }
        
        const eventCard = document.querySelector('.event-card');
        if (eventCard) {
            const currentWidth = eventCard.offsetWidth;
            document.getElementById('event-width-slider').value = currentWidth;
            document.getElementById('event-width-val').innerText = currentWidth;
        }
        
        const title = document.querySelector('.title');
        if (title) {
            const currentFont = parseFloat(getComputedStyle(title).fontSize);
            const currentRem = currentFont / 16;
            document.getElementById('title-font-slider').value = currentRem;
            document.getElementById('title-font-val').innerText = currentRem.toFixed(1);
        }
        
        const log = document.querySelector('.log');
        if (log) {
            const currentFont = parseFloat(getComputedStyle(log).fontSize);
            const currentRem = currentFont / 16;
            document.getElementById('text-font-slider').value = currentRem;
            document.getElementById('text-font-val').innerText = currentRem.toFixed(2);
        }
        
        const container = document.querySelector('.game-container');
        if (container) {
            const currentRadius = parseFloat(getComputedStyle(container).borderRadius);
            document.getElementById('radius-slider').value = currentRadius / 2.4;
            document.getElementById('radius-val').innerText = Math.round(currentRadius / 2.4);
        }
    }
    
    // Сброс всех настроек
    function resetSettings() {
        document.getElementById('hero-width-slider').value = 260;
        document.getElementById('hero-height-slider').value = 260;
        document.getElementById('event-width-slider').value = 400;
        document.getElementById('title-font-slider').value = 2.5;
        document.getElementById('text-font-slider').value = 0.9;
        document.getElementById('radius-slider').value = 20;
        applyStyles();
    }
    
    // Подписка на события
    document.getElementById('hero-width-slider').addEventListener('input', applyStyles);
    document.getElementById('hero-height-slider').addEventListener('input', applyStyles);
    document.getElementById('event-width-slider').addEventListener('input', applyStyles);
    document.getElementById('title-font-slider').addEventListener('input', applyStyles);
    document.getElementById('text-font-slider').addEventListener('input', applyStyles);
    document.getElementById('radius-slider').addEventListener('input', applyStyles);
    document.getElementById('reset-debug-btn').addEventListener('click', resetSettings);
    
    // Наблюдатель за появлением новых карточек (для динамически создаваемых)
    const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.addedNodes.length > 0) {
                applyStyles();
            }
        });
    });
    
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
