<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тигримион · Хроники Королевств</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-container">
    <div class="title">⚔️ ТИГРИМИОН · БИТВА КОРОЛЕВСТВ ⚔️</div>
    
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="2">👥 2 Игрока</button>
        <button class="mode-btn" data-mode="3">👥 3 Игрока</button>
        <button class="mode-btn" data-mode="4">👥 4 Игрока</button>
        <button class="mode-btn" data-mode="pc">🤖 Против ПК</button>
    </div>

    <div class="sub">
        Раунд <span id="roundDisplay">1/5</span> · Счёт <span id="scoreDisplay">0 : 0</span>
        <button class="reset-stats-btn" id="resetStatsBtn">📊 Сбросить статистику</button>
        <button class="reset-stats-btn" id="resetGoldBtn" style="margin-left:10px;">💰 Сбросить золото</button>
    </div>

    <!-- Верхний ряд: Рынок + События + Колода -->
    <div class="top-market-row">
        <!-- Зона продажи (слева) -->
        <div class="sell-zone" id="sellZone" data-action="sell">
            <div class="sell-zone-icon">💰</div>
            <div class="sell-zone-text">РЫНОК РАБОВ</div>
            <div class="sell-zone-hint">Перетащите героя сюда для продажи</div>
        </div>

        <!-- Карты событий -->
        <div class="event-cards-row" id="eventCardsContainer"></div>

        <!-- Зона колоды (справа) -->
        <div class="deck-zone" id="deckZone">
            <div class="deck-card">
                <div class="deck-card-back">🃏</div>
                <div class="deck-card-text">КОЛОДА</div>
                <div class="deck-card-price">🎲 100💰</div>
            </div>
            <div class="deck-hint">Нажмите для покупки случайного героя</div>
        </div>
    </div>

    <div class="arena" id="arenaContainer"></div>

    <div class="turn-indicator" id="turnIndicator"></div>

    <!-- Отображение золота игроков -->
    <div class="players-gold-row" id="playersGoldContainer"></div>

    <div style="display: flex; gap: 20px; margin: 20px 0;">
        <button class="fight-btn" id="actionBtn" style="flex: 1;">✅ ЗАКОНЧИТЬ ВЫБОР</button>
    </div>

    <div class="log" id="log">[⚔️] Тигримион ждёт. Выберите героя для Раунда 1.</div>
    <button class="fight-btn reset-btn" id="resetGame" style="margin-top: 10px;">🔄 НОВАЯ КАМПАНИЯ</button>
</div>

<!-- Модальное окно открытого рынка -->
<div id="marketModal" class="market-modal hidden">
    <div class="market-modal-content">
        <div class="market-modal-header">
            <span>🛒 ОТКРЫТЫЙ РЫНОК — 200💰 ЗА ГЕРОЯ</span>
            <button class="market-modal-close" id="closeMarketModal">✕</button>
        </div>
        <div class="market-cards-row" id="marketCardsContainer"></div>
        <div class="market-modal-footer">
            <button class="market-btn" id="buyRandomFromModal">🎲 Купить случайного (100💰)</button>
        </div>
    </div>
</div>

<!-- ========== МУЗЫКАЛЬНЫЙ ПЛЕЕР ========== -->
<audio id="bgMusic" preload="auto"></audio>

<div id="musicPlayer" class="music-player">
    <button id="togglePlaylist" class="music-toggle-btn" title="Открыть плейлист">🎵</button>
    
    <div id="playlistPanel" class="playlist-panel hidden">
        <div class="playlist-header">
            <span>🎧 ПЛЕЙЛИСТ</span>
            <button id="closePlaylist" class="playlist-close-btn">✕</button>
        </div>
        
        <div class="now-playing" id="nowPlaying">
            <span class="now-playing-icon">🎼</span>
            <span class="now-playing-text">Ничего не играет</span>
        </div>
        
        <div class="player-controls">
            <button id="prevTrackBtn" class="player-btn" title="Предыдущий трек">⏮️</button>
            <button id="playPauseBtn" class="player-btn player-btn-play" title="Воспроизвести">▶️</button>
            <button id="nextTrackBtn" class="player-btn" title="Следующий трек">⏭️</button>
        </div>
        
        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="30" class="volume-slider">
            <span id="volumeValue" class="volume-value">30%</span>
        </div>
        
        <div class="playlist-tracks" id="playlistTracks"></div>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
